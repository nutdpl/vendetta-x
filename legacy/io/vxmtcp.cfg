/*
 * vxmtcp.cfg -- mTCP compile-time feature config for Vendetta/X's io_mtcp backend.
 * Selected with -DCFG_H="vxmtcp.cfg". Modeled on mTCP's sample.cfg; the key
 * addition is TCP_LISTEN_CODE (Vendetta/X is a server -- it accepts callers).
 * mTCP itself stays external/GPLv3; this file only configures how we build it.
 */
#ifndef CONFIG_H
#define CONFIG_H

#define MTCP_PROGRAM_NAME "vendx"

#include "global.cfg"

#define COMPILE_ARP
#define IP_FRAGMENTS_ON
#define COMPILE_UDP
#define COMPILE_TCP
#define COMPILE_DNS
#define COMPILE_ICMP
#define TCP_LISTEN_CODE          /* server side: listen()/accept() */

#undef  TCP_MAX_SOCKETS
#define TCP_MAX_SOCKETS (2)        /* one listener + one accepted caller */

/* mTCP's default packet pools (10 rx of 1514 + 10 tx) blow the 64k DGROUP by
 * ~23k. A single-connection telnet node needs only a few small buffers --
 * PACKET_BUFFERS min is 5, PACKET_BUFFER_LEN min is 310 (MSS ~256). */
#undef  PACKET_BUFFERS
#define PACKET_BUFFERS (5)
#define PACKET_BUFFER_LEN (512)
#undef  TCP_MAX_XMIT_BUFS
#define TCP_MAX_XMIT_BUFS (4)
#undef  PKT_DUMP_BYTES            /* no packet tracing -- keep <= PACKET_BUFFER_LEN */
#define PKT_DUMP_BYTES (64)

#endif
